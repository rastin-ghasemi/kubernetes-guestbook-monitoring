apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: guestbook-frontend
  labels:
    app: guestbook
    tier: frontend
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: metrics
    port: 9117
    targetPort: 9117
  selector:
    app: guestbook
    tier: frontend
