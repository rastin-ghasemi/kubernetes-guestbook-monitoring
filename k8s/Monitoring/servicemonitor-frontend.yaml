apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: frontend-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
    - guestbook-frontend
  selector:
    matchLabels:
      app: guestbook
      tier: frontend
  endpoints:
  - port: metrics        # ← now scraping port 9117 not 80
    interval: 15s
    path: /metrics