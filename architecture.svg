<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Guestbook monitoring architecture diagram</title>
<desc>4-node Minikube cluster with Redis backend, PHP frontend, Nginx ingress, and Prometheus/Grafana monitoring stack</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: ui-sans-serif, system-ui, sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .arr { stroke: #888; stroke-width: 1; fill: none; }
    /* node colors */
    .c-gray-rect   { fill: #f1efe8; stroke: #888780; }
    .c-teal-rect   { fill: #e1f5ee; stroke: #0f6e56; }
    .c-purple-rect { fill: #eeedfe; stroke: #534ab7; }
    .c-coral-rect  { fill: #faece7; stroke: #993c1d; }
    .c-blue-rect   { fill: #e6f1fb; stroke: #185fa5; }
    .c-amber-rect  { fill: #faeeda; stroke: #854f0b; }
    .c-green-rect  { fill: #eaf3de; stroke: #3b6d11; }
    .c-teal2-rect  { fill: #e1f5ee; stroke: #0f6e56; }
    .c-gray-text   { fill: #444441; }
    .c-teal-text   { fill: #085041; }
    .c-purple-text { fill: #3c3489; }
    .c-coral-text  { fill: #712b13; }
    .c-blue-text   { fill: #0c447c; }
    .c-amber-text  { fill: #633806; }
    .c-green-text  { fill: #27500a; }
    .border-dash   { fill: none; stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 4 3; }
    .border-node   { fill: none; stroke: #888; stroke-width: 0.5; }
    .muted         { fill: #888; }
    .secondary     { fill: #555; }
  </style>
</defs>

<!-- ── outer cluster boundary ── -->
<rect x="20" y="44" width="640" height="660" rx="16" class="border-dash"/>
<text class="ts muted" x="36" y="38" style="font-size:11px">minikube cluster · 4 nodes · Kubernetes v1.35</text>

<!-- ══ INTERNET ══ -->
<rect x="272" y="56" width="136" height="36" rx="8" class="c-gray-rect" stroke-width="0.5"/>
<text class="th c-gray-text" x="340" y="78" text-anchor="middle">Internet / browser</text>

<!-- arrow: internet → ingress -->
<line x1="340" y1="92" x2="340" y2="128" class="arr" marker-end="url(#arrow)"/>

<!-- ══ NODE: minikube-m04 — INGRESS ══ -->
<rect x="60" y="130" width="560" height="86" rx="12" class="border-node"/>
<text class="ts muted" x="76" y="148" style="font-size:10px">minikube-m04 · taint: tier=ingress:NoSchedule</text>
<rect x="200" y="156" width="280" height="44" rx="8" class="c-teal-rect" stroke-width="0.5"/>
<text class="th c-teal-text" x="340" y="174" text-anchor="middle" dominant-baseline="central">Nginx ingress controller</text>
<text class="ts c-teal-text" x="340" y="190" text-anchor="middle" dominant-baseline="central" style="font-size:11px">guestbook.local · grafana.local</text>

<!-- arrows: ingress → frontend, ingress → grafana -->
<path d="M260 200 L180 234" class="arr" marker-end="url(#arrow)"/>
<path d="M420 200 L500 234" class="arr" marker-end="url(#arrow)"/>

<!-- ══ NODE: minikube-m03 — FRONTEND + MONITORING ══ -->
<rect x="60" y="234" width="560" height="216" rx="12" class="border-node"/>
<text class="ts muted" x="76" y="252" style="font-size:10px">minikube-m03 · taint: tier=frontend:NoSchedule</text>

<!-- Frontend namespace box -->
<rect x="74" y="262" width="254" height="174" rx="8" class="border-dash"/>
<text class="ts muted" x="86" y="276" style="font-size:10px">ns: guestbook-frontend</text>

<rect x="84" y="284" width="234" height="52" rx="8" class="c-purple-rect" stroke-width="0.5"/>
<text class="th c-purple-text" x="201" y="305" text-anchor="middle" dominant-baseline="central">PHP frontend pod (×2)</text>
<text class="ts c-purple-text" x="201" y="323" text-anchor="middle" dominant-baseline="central" style="font-size:11px">gb-frontend:v5 · port 80</text>

<rect x="84" y="346" width="234" height="52" rx="8" class="c-coral-rect" stroke-width="0.5"/>
<text class="th c-coral-text" x="201" y="367" text-anchor="middle" dominant-baseline="central">apache-exporter sidecar</text>
<text class="ts c-coral-text" x="201" y="385" text-anchor="middle" dominant-baseline="central" style="font-size:11px">bitnami/apache-exporter · port 9117</text>

<line x1="201" y1="336" x2="201" y2="346" stroke="#888" stroke-width="0.5"/>

<!-- Monitoring namespace box -->
<rect x="352" y="262" width="254" height="174" rx="8" class="border-dash"/>
<text class="ts muted" x="364" y="276" style="font-size:10px">ns: monitoring</text>

<rect x="362" y="284" width="234" height="52" rx="8" class="c-blue-rect" stroke-width="0.5"/>
<text class="th c-blue-text" x="479" y="305" text-anchor="middle" dominant-baseline="central">Prometheus</text>
<text class="ts c-blue-text" x="479" y="323" text-anchor="middle" dominant-baseline="central" style="font-size:11px">kube-prometheus-stack · port 9090</text>

<rect x="362" y="346" width="234" height="52" rx="8" class="c-amber-rect" stroke-width="0.5"/>
<text class="th c-amber-text" x="479" y="367" text-anchor="middle" dominant-baseline="central">Grafana</text>
<text class="ts c-amber-text" x="479" y="385" text-anchor="middle" dominant-baseline="central" style="font-size:11px">3 custom dashboards · port 3000</text>

<line x1="479" y1="336" x2="479" y2="346" stroke="#888" stroke-width="0.5"/>

<!-- prometheus scrape arrow -->
<path d="M362 310 Q310 310 318 372" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts muted" x="298" y="344" text-anchor="middle" style="font-size:10px">scrape</text>
<text class="ts muted" x="298" y="356" text-anchor="middle" style="font-size:10px">:9117</text>

<!-- ══ NODE: minikube-m02 — BACKEND ══ -->
<rect x="60" y="474" width="560" height="162" rx="12" class="border-node"/>
<text class="ts muted" x="76" y="492" style="font-size:10px">minikube-m02 · taint: tier=backend:NoSchedule</text>

<rect x="74" y="502" width="530" height="120" rx="8" class="border-dash"/>
<text class="ts muted" x="86" y="516" style="font-size:10px">ns: guestbook-backend</text>

<rect x="90" y="524" width="200" height="52" rx="8" class="c-green-rect" stroke-width="0.5"/>
<text class="th c-green-text" x="190" y="545" text-anchor="middle" dominant-baseline="central">Redis leader</text>
<text class="ts c-green-text" x="190" y="563" text-anchor="middle" dominant-baseline="central" style="font-size:11px">registry.k8s.io/redis · port 6379</text>

<rect x="390" y="524" width="200" height="52" rx="8" class="c-teal2-rect" stroke-width="0.5"/>
<text class="th c-teal-text" x="490" y="545" text-anchor="middle" dominant-baseline="central">Redis followers (×2)</text>
<text class="ts c-teal-text" x="490" y="563" text-anchor="middle" dominant-baseline="central" style="font-size:11px">gb-redis-follower:v2 · port 6379</text>

<path d="M290 550 L390 550" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts muted" x="340" y="544" text-anchor="middle" style="font-size:10px">replication</text>

<!-- frontend → redis arrow -->
<path d="M201 450 L201 460 Q201 474 220 490 L240 502" fill="none" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- ══ SECURITY LEGEND ══ -->
<rect x="60" y="652" width="560" height="44" rx="8" class="border-dash"/>
<text class="ts muted" x="80" y="670" style="font-size:10px">Security:</text>
<rect x="136" y="660" width="8" height="8" rx="2" fill="#888"/>
<text class="ts secondary" x="150" y="670" style="font-size:10px">9 NetworkPolicies</text>
<rect x="270" y="660" width="8" height="8" rx="2" fill="#888"/>
<text class="ts secondary" x="284" y="670" style="font-size:10px">3 ResourceQuotas + LimitRanges</text>
<rect x="460" y="660" width="8" height="8" rx="2" fill="#888"/>
<text class="ts secondary" x="474" y="670" style="font-size:10px">3 PodDisruptionBudgets</text>
<text class="ts muted" x="80" y="688" style="font-size:10px">IaC:</text>
<text class="ts secondary" x="112" y="688" style="font-size:10px">Pulumi TypeScript · 38 resources · kube-prometheus-stack v87.3.0 · Grafana v13</text>

</svg>
